<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>딱 하나만 (Micro Habit Tracker)</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-sub: #6c757d;
            --primary: #4dabf7;
            --border: #e9ecef;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 스마트폰 화면 모양 컨테이너 */
        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 390px;
            height: 844px;
            border-radius: 40px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.05), 0 10px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 8px solid #212529;
            position: relative;
            box-sizing: border-box;
        }

        .app-header {
            padding: 30px 24px 10px 24px;
            border-bottom: 1px solid var(--border);
        }

        .date-text {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .app-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-section, .routine-display, .emoji-section {
            background: #f1f3f5;
            padding: 20px;
            border-radius: 20px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
            display: block;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            background-color: #212529;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #495057;
        }

        .routine-text {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin: 10px 0;
            word-break: break-all;
        }

        .emoji-group {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .emoji-btn {
            font-size: 28px;
            background: none;
            border: none;
            padding: 5px;
            cursor: pointer;
            width: auto;
            transition: transform 0.2s;
        }

        .emoji-btn:hover {
            transform: scale(1.2);
        }

        .history-section {
            padding: 0 24px 24px 24px;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="date-text" id="today-date"></div>
        <h1 class="app-title">🎯 딱 하나만</h1>
    </div>

    <div class="app-content">
        <div class="input-section" id="input-box">
            <label>오늘의 단 하나의 루틴</label>
            <input type="text" id="routine-input" placeholder="예: 집에 와서 책 한 장 읽기">
            <button onclick="registerRoutine()">등록하기</button>
        </div>

        <div class="routine-display" id="display-box" style="display: none;">
            <label>오늘의 목표</label>
            <div class="routine-text" id="current-routine"></div>
        </div>

        <div class="emoji-section" id="emoji-box" style="display: none;">
            <label>오늘의 실천 결과는?</label>
            <div class="emoji-group">
                <button class="emoji-btn" onclick="saveResult('🔥')">🔥</button>
                <button class="emoji-btn" onclick="saveResult('✅')">✅</button>
                <button class="emoji-btn" onclick="saveResult('💤')">💤</button>
                <button class="emoji-btn" onclick="saveResult('❌')">❌</button>
            </div>
        </div>
    </div>

    <div class="history-section">
        <label>지난 기록</label>
        <div id="history-list"></div>
    </div>
</div>

<script>
    const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
    document.getElementById('today-date').innerText = new Date().toLocaleDateString('ko-KR', options);

    function registerRoutine() {
        const input = document.getElementById('routine-input').value.trim();
        if(!input) {
            alert('루틴을 입력해주세요!');
            return;
        }
        if (input.includes('.') || input.length > 25) {
            alert('⚠️ 주의: 한 문장 형태로 간결하게 작성해주세요!');
        }
        document.getElementById('current-routine').innerText = input;
        document.getElementById('input-box').style.display = 'none';
        document.getElementById('display-box').style.display = 'block';
        document.getElementById('emoji-box').style.display = 'block';
    }

    function saveResult(emoji) {
        const routine = document.getElementById('current-routine').innerText;
        const dateStr = new Date().toLocaleDateString('ko-KR', {month: 'short', day: 'numeric'});
        const historyList = document.getElementById('history-list');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<span>${dateStr} - ${routine}</span> <span>${emoji}</span>`;
        historyList.insertBefore(item, historyList.firstChild);

        document.getElementById('routine-input').value = '';
        document.getElementById('input-box').style.display = 'block';
        document.getElementById('display-box').style.display = 'none';
        document.getElementById('emoji-box').style.display = 'none';
        alert('오늘의 기록이 저장되었습니다!');
    }
</script>

</body>
</html>
